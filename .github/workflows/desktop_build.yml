name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_path: build/linux/x64/release/bundle
          - os: windows-latest
            target: windows
            artifact_path: build/windows/x64/runner/Release
          - os: macos-latest
            target: macos
            artifact_path: build/macos/Build/Products/Release/*.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Enable desktop target
        run: flutter config --enable-${{ matrix.target }}-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build
        run: flutter build ${{ matrix.target }} --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app1-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
